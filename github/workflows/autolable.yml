# ==========================================================
# GitHub Actions Workflow
# Purpose:
# Automatically ensure labels named
# "GSSoC'26" and "NSoC'26" exist and attach
# them whenever a new issue is opened.
# ==========================================================

name: "Auto-label GSSoC'26 and NSoC'26 on issue opened"



# ==========================================================
# Workflow Trigger Section
# ==========================================================

on:
  issues:
    types:
      - opened



# ==========================================================
# Permission Configuration
# ==========================================================

permissions:
  issues: write




# ==========================================================
# Jobs Section
# ==========================================================

jobs:

  add-labels:

    # ======================================================
    # Runner Environment
    # ======================================================

    runs-on: ubuntu-latest



    # ======================================================
    # Steps
    # ======================================================

    steps:

      - name: Ensure and add labels

        uses: actions/github-script@v6

        with:

          script: |

            // ============================================
            // Define labels
            // ============================================

            const labels = [
              {
                name: "NSoC'26",
                color: "0e8a16",
                description: "Label for NSoC 2026 issues"
              },
              {
                name: "GSSoC'26",
                color: "1d76db",
                description: "Label for GSSoC 2026 issues"
              }
            ];



            // ============================================
            // Repository details
            // ============================================

            const { owner, repo } = context.repo;



            // ============================================
            // Ensure labels exist
            // ============================================

            for (const label of labels) {

              try {

                await github.rest.issues.getLabel({

                  owner,
                  repo,
                  name: label.name

                });

              }

              catch (err) {

                await github.rest.issues.createLabel({

                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description

                })

                .catch(() => {});

              }

            }



            // ============================================
            // Add labels to new issue
            // ============================================

            await github.rest.issues.addLabels({

              owner,
              repo,
              issue_number:
                context.payload.issue.number,

              labels: labels.map(
                label => label.name
              )

            });



            // ============================================
            // End of workflow
            // ============================================
